<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>מדד המוכנות להשקעת נדל"ן בארה"ב | Kamir Group</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ebe2cc;           /* קרם עמוק – מאוזן, לא בהיר מדי */
    --bg-2:#f1e9d5;
    --surface:#faf4e4;
    --ink:#2b313c;
    --ink-2:#4a5160;
    --muted:#7d7868;
    --cream:#d9c29a;
    --accent:#2b313c;
    --accent-soft:rgba(43,49,60,.08);
  }
  html,body{font-family:'Assistant','Heebo',sans-serif;background:var(--bg);color:var(--ink);}
  .surface{background:var(--surface);border:1px solid rgba(43,49,60,.08);box-shadow:0 1px 3px rgba(43,49,60,.04);}
  .ink{color:var(--ink);}
  .muted{color:var(--muted);}
  .cream-text{color:#a58348;}
  .cta{background:var(--ink);color:#fff;transition:all .2s ease;}
  .cta:hover{background:#1a1f28;transform:translateY(-1px);box-shadow:0 8px 24px rgba(43,49,60,.25);}
  .cta-cream{background:var(--cream);color:var(--ink);transition:all .2s ease;}
  .cta-cream:hover{background:#d9c29a;transform:translateY(-1px);}
  .option-card{background:var(--surface);border:1.5px solid rgba(43,49,60,.1);transition:all .2s ease;}
  .option-card:hover{transform:translateX(-3px);border-color:var(--ink);box-shadow:0 4px 12px rgba(43,49,60,.08);}
  .option-card.selected{border-color:var(--ink);background:var(--accent-soft);box-shadow:0 0 0 2px rgba(43,49,60,.12);}
  /* Scale question (1-10) */
  .scale-wrap{padding:18px;background:var(--surface);border:1px solid rgba(43,49,60,.08);border-radius:16px;}
  .scale-row{display:flex;gap:6px;flex-direction:row-reverse;}
  .scale-btn{flex:1;min-width:0;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:2px solid transparent;border-radius:10px;font-weight:800;font-size:15px;color:var(--ink);cursor:pointer;transition:all .18s ease;position:relative;}
  .scale-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(43,49,60,.15);}
  .scale-btn.selected{border-color:var(--ink);transform:translateY(-3px);box-shadow:0 8px 20px rgba(43,49,60,.22);}
  .scale-anchor-row{display:flex;flex-direction:row-reverse;gap:6px;margin-top:10px;}
  .scale-anchor{flex:1;min-width:0;text-align:center;font-size:11px;line-height:1.35;color:var(--ink-2);font-weight:600;}
  .scale-anchor.filler{opacity:0;}
  .scale-feedback{margin-top:14px;padding:12px 16px;background:rgba(43,49,60,.06);border-radius:10px;text-align:center;font-size:14px;color:var(--ink);font-weight:600;min-height:44px;display:flex;align-items:center;justify-content:center;transition:all .3s ease;}
  /* Question visual accent */
  .q-badge{display:inline-flex;align-items:center;gap:12px;padding:10px 16px 10px 20px;border-radius:999px;margin-bottom:18px;}
  .q-badge-icon{width:38px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .fade-in{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .progress-bar{height:6px;background:rgba(43,49,60,.08);border-radius:999px;overflow:hidden;}
  .progress-bar>div{height:100%;background:var(--ink);transition:width .5s ease;}
  .pillar-dot{width:10px;height:10px;border-radius:999px;}
  .hero-img{position:relative;background-image:url('assets/hero.jpg');background-size:cover;background-position:center;}
  .hero-img::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(235,226,204,.55) 0%,rgba(235,226,204,.35) 50%,rgba(235,226,204,.7) 100%);}
  .hero-text h1,.hero-text p{text-shadow:0 1px 2px rgba(247,241,227,.9),0 0 20px rgba(247,241,227,.6);}
  .hero-card{background:rgba(250,244,228,.82);backdrop-filter:blur(6px);border:1px solid rgba(43,49,60,.08);border-radius:22px;padding:28px 32px;box-shadow:0 10px 40px rgba(43,49,60,.08);}
  @media(max-width:640px){.hero-card{padding:22px 20px;}}
  .social-link{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;background:var(--surface);border:1px solid rgba(43,49,60,.12);font-weight:600;font-size:14px;color:var(--ink);transition:all .15s ease;}
  .social-link:hover{background:var(--ink);color:#fff;border-color:var(--ink);transform:translateY(-1px);}
  .hero-img > *{position:relative;z-index:1;}
  .results-bg{position:relative;background-image:url('assets/results-bg.jpg');background-size:cover;background-position:center;background-attachment:fixed;}
  .results-bg::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(235,226,204,.38) 0%,rgba(235,226,204,.56) 60%,rgba(235,226,204,.74) 100%);}
  .results-bg > *{position:relative;z-index:1;}
  .step-card{background:var(--surface);border:1px solid rgba(43,49,60,.08);border-radius:14px;padding:16px 12px;text-align:center;position:relative;transition:transform .2s ease;}
  .step-card:hover{transform:translateY(-2px);}
  .step-card.done{background:rgba(31,90,78,.08);border-color:rgba(31,90,78,.25);}
  .step-card.done .step-num{background:#1f5a4e;color:#fff;}
  .step-card.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .step-card.active .step-num{background:var(--cream);color:var(--ink);}
  .step-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:999px;background:var(--accent-soft);color:var(--ink);font-weight:800;margin-bottom:6px;font-size:13px;}
  .step-time{display:inline-block;padding:2px 8px;border-radius:999px;background:rgba(43,49,60,.06);font-size:10px;font-weight:700;color:var(--ink-2);letter-spacing:.3px;margin-bottom:6px;}
  .step-card.done .step-time{background:rgba(31,90,78,.15);color:#1f5a4e;}
  .step-card.active .step-time{background:rgba(217,194,154,.25);color:var(--cream);}
  .step-arrow{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;}
  .logo{height:76px;width:auto;display:block;filter:invert(1) brightness(0.25) drop-shadow(0 0 18px rgba(247,241,227,1)) drop-shadow(0 0 8px rgba(247,241,227,1)) drop-shadow(0 4px 10px rgba(43,49,60,.3));}
  @media(max-width:640px){
    .logo{height:52px;}
    .surface.rounded-3xl{padding:18px !important;}
    .results-bg .pillar-info-inline{padding:12px 14px;}
    .axis-card{padding:12px 14px !important;}
    /* Mobile journey — vertical flow-chart with dashed connector line */
    .journey-row{
      display:flex !important;
      flex-direction:column !important;
      gap:8px !important;
      flex-wrap:initial !important;
      position:relative;
      padding:0 4px;
    }
    .journey-row::before{
      content:'';
      position:absolute;
      right:30px; top:24px; bottom:24px;
      border-right:2px dashed rgba(43,49,60,.18);
      z-index:0;
    }
    .step-card{
      padding:10px 14px !important;
      display:grid !important;
      grid-template-columns:30px 1fr auto 14px;
      grid-template-rows:auto auto;
      column-gap:10px;
      row-gap:0px;
      text-align:right !important;
      align-items:center;
      border-radius:14px !important;
      border:1px solid rgba(43,49,60,.08) !important;
      background:rgba(250,244,228,.92) !important;
      flex:initial !important;
      min-width:0 !important;
      position:relative;
      z-index:1;
    }
    .step-card.done{background:rgba(31,90,78,.08) !important;border-color:rgba(31,90,78,.20) !important;}
    .step-card.active{background:var(--ink) !important;border-color:var(--ink) !important;color:#fff !important;}
    .step-card.active > .font-bold{color:#fff !important;}
    .step-card.active .step-time{background:rgba(217,194,154,.25) !important;color:var(--cream) !important;}
    .step-card .step-num{grid-column:1;grid-row:1 / span 2;align-self:center;margin-bottom:0 !important;width:30px !important;height:30px !important;font-size:13px !important;z-index:2;}
    .step-card > .font-bold{grid-column:2;grid-row:1;font-size:13px !important;text-align:right;line-height:1.2;}
    .step-card .step-time{grid-column:3;grid-row:1;margin-bottom:0 !important;justify-self:end;font-size:10px !important;padding:2px 8px !important;white-space:nowrap !important;}
    .step-card::after{content:'›';grid-column:4;grid-row:1;font-size:14px;font-weight:900;opacity:.45;transform:rotate(90deg);transition:transform .3s ease;justify-self:center;}
    .step-card.active::after{opacity:.7;color:var(--cream);}
    .step-card.expanded::after{transform:rotate(-90deg);opacity:.85;}
    .step-card > .text-xs{grid-column:1 / -1;grid-row:2;text-align:right;font-size:10.5px !important;line-height:1.35;margin-top:6px !important;padding-top:6px;border-top:1px solid rgba(43,49,60,.10);max-height:0;overflow:hidden;opacity:0;padding-bottom:0;transition:max-height .3s ease, opacity .25s ease, margin-top .3s ease, padding-top .3s ease;}
    .step-card.active > .text-xs{border-top-color:rgba(217,194,154,.35);}
    .step-card.expanded > .text-xs{max-height:80px;opacity:1;}
    .step-arrow{display:none !important;}
  }
  /* Category info popover */
  .cat-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;background:rgba(43,49,60,.08);color:var(--ink);font-weight:800;font-size:12px;border:none;cursor:pointer;transition:all .15s ease;}
  .cat-btn:hover{background:var(--ink);color:#fff;transform:scale(1.08);}
  .cat-modal-bg{position:fixed;inset:0;background:rgba(43,49,60,.55);backdrop-filter:blur(4px);z-index:40;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .25s ease;}
  .cat-modal{background:var(--surface);border-radius:18px;padding:28px;max-width:480px;width:100%;border:1px solid rgba(43,49,60,.1);box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .pie-wrap{position:relative;width:240px;height:240px;}
  .pie-wrap svg{transform:rotate(-90deg);}
  .pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .axis-card{background:var(--surface);border-radius:16px;padding:12px 14px;position:relative;overflow:hidden;border:1px solid rgba(43,49,60,.08);transition:transform .25s ease, box-shadow .25s ease;}
  .axis-card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(43,49,60,.10);}
  .axis-card .axis-bar{height:6px;border-radius:999px;background:rgba(43,49,60,.08);overflow:hidden;margin-top:8px;position:relative;}
  .axis-card .axis-bar>div{height:100%;border-radius:999px;transition:width 1.1s cubic-bezier(.2,.8,.2,1);box-shadow:inset 0 -1px 2px rgba(0,0,0,.08);}
  .axis-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.3px;}
  .axis-icon-wrap{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 8px rgba(43,49,60,.10);flex-shrink:0;}
  .axis-score{font-size:26px;font-weight:900;line-height:1;letter-spacing:-1px;}
  @media(min-width:768px){
    .axis-card{padding:16px 18px;border-radius:18px;}
    .axis-card .axis-bar{height:8px;margin-top:10px;}
    .axis-badge{padding:4px 11px;font-size:11px;}
    .axis-icon-wrap{width:40px;height:40px;border-radius:12px;font-size:20px;}
    .axis-score{font-size:32px;}
  }
  /* Pillar-complete toast (non-blocking) */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid rgba(43,49,60,.1);box-shadow:0 10px 30px rgba(43,49,60,.18);border-radius:999px;padding:10px 18px 10px 14px;display:flex;align-items:center;gap:10px;z-index:40;animation:toastIn .35s cubic-bezier(.2,1.3,.3,1),toastOut .4s ease 2s forwards;pointer-events:none;}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,20px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes toastOut{to{opacity:0;transform:translate(-50%,-8px);}}
  .toast-check{width:26px;height:26px;border-radius:999px;background:#1f5a4e;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;}
  /* Accessibility widget */
  .a11y-fab-wrap{position:fixed;bottom:18px;left:18px;display:flex;align-items:center;gap:6px;z-index:60;transition:transform .35s cubic-bezier(.2,.8,.2,1);}
  .a11y-fab-wrap.tucked{transform:translateX(calc(-100% + 22px));}
  .a11y-fab{width:54px;height:54px;border-radius:50%;background:#1f5a4e;color:#fff;border:3px solid #fff;box-shadow:0 8px 24px rgba(43,49,60,.28);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform .2s ease, background .2s ease;flex-shrink:0;}
  .a11y-fab:hover{transform:scale(1.08);background:#2d7a5f;}
  .a11y-fab:focus{outline:3px solid #ffd966;outline-offset:2px;}
  .a11y-tuck{width:22px;height:44px;background:#1f5a4e;color:#fff;border:none;border-radius:0 10px 10px 0;cursor:pointer;font-size:14px;font-weight:900;box-shadow:0 4px 10px rgba(43,49,60,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;}
  .a11y-tuck:hover{background:#2d7a5f;}
  .a11y-fab-wrap.tucked .a11y-tuck{border-radius:0 10px 10px 0;}
  .a11y-panel{position:fixed;bottom:80px;left:18px;width:280px;max-width:calc(100vw - 36px);background:var(--surface);border:1px solid rgba(43,49,60,.12);border-radius:16px;box-shadow:0 18px 48px rgba(43,49,60,.22);z-index:60;padding:14px;animation:fade .22s ease;}
  .a11y-panel h3{font-size:14px;font-weight:800;margin-bottom:10px;color:var(--ink);display:flex;align-items:center;justify-content:space-between;}
  .a11y-panel .close-btn{background:rgba(43,49,60,.08);border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;font-weight:900;color:var(--ink);}
  .a11y-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .a11y-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 6px;background:rgba(43,49,60,.05);border:1px solid rgba(43,49,60,.10);border-radius:10px;cursor:pointer;font-size:11px;font-weight:700;color:var(--ink-2);transition:all .15s ease;text-align:center;line-height:1.2;}
  .a11y-btn:hover{background:rgba(43,49,60,.10);border-color:rgba(43,49,60,.20);}
  .a11y-btn.active{background:#1f5a4e;color:#fff;border-color:#1f5a4e;}
  .a11y-btn .ic{font-size:18px;}
  .a11y-reset{margin-top:8px;width:100%;padding:8px;background:rgba(184,92,62,.08);border:1px solid rgba(184,92,62,.25);color:#b85c3e;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
  .a11y-reset:hover{background:rgba(184,92,62,.16);}
  .a11y-statement{margin-top:6px;width:100%;padding:8px;background:rgba(43,49,60,.05);border:1px solid rgba(43,49,60,.12);color:var(--ink-2);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;}
  /* Applied accessibility classes */
  html.a11y-fs1{font-size:17px !important;}
  html.a11y-fs2{font-size:19px !important;}
  html.a11y-fs3{font-size:21px !important;}
  html.a11y-highlight a, html.a11y-highlight button{outline:2px dashed #1f5a4e !important;outline-offset:2px;}
  html.a11y-stop *, html.a11y-stop *::before, html.a11y-stop *::after{animation-duration:0.001ms !important;animation-iteration-count:1 !important;animation-delay:0s !important;transition-duration:0.001ms !important;transition-delay:0s !important;}
  html.a11y-readable, html.a11y-readable *{font-family:'Arial','David',sans-serif !important;letter-spacing:.04em !important;line-height:1.7 !important;}
  html.a11y-contrast{filter:contrast(1.25);}
  /* Next step box (replaces tier label) */
  .next-step-box{background:linear-gradient(135deg, rgba(31,90,78,.05), rgba(31,90,78,.12));border:1px solid rgba(31,90,78,.18);border-right:4px solid #1f5a4e;border-radius:16px;padding:16px 18px;}
  .radar-wrap{position:relative;}
  .radar-wrap svg{overflow:visible;}
  .radar-vertex{cursor:pointer;transition:r .2s ease, filter .25s ease;}
  .radar-vertex:hover{filter:brightness(1.15) drop-shadow(0 0 10px currentColor);}
  /* Mobile scroll hint */
  .scroll-hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 18px;border-radius:999px;font-size:12px;font-weight:800;z-index:55;pointer-events:none;animation:scrollHintBounce 1.6s ease-in-out infinite;box-shadow:0 6px 20px rgba(43,49,60,.35);display:none;letter-spacing:.4px;}
  @media(max-width:640px){.scroll-hint{display:flex;align-items:center;gap:6px;}}
  @keyframes scrollHintBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
  .scroll-hint.fading{opacity:0;transition:opacity .4s ease;}
  /* Bonus badge */
  .bonus-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:999px;background:linear-gradient(135deg, #f4d57a, #e8b54a);color:#5a3e0f;font-weight:900;font-size:14px;letter-spacing:.4px;box-shadow:0 6px 20px rgba(232,181,74,.35), inset 0 1px 0 rgba(255,255,255,.5);margin-bottom:14px;animation:bonusPop .5s cubic-bezier(.2,1.4,.3,1), bonusFloat 2.8s ease-in-out infinite 1s;}
  .bonus-badge .spark{display:inline-block;animation:sparkSpin 2.4s ease-in-out infinite;font-size:16px;}
  @keyframes bonusPop{0%{opacity:0;transform:scale(.6) translateY(8px);}100%{opacity:1;transform:scale(1) translateY(0);}}
  @keyframes bonusFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  @keyframes sparkSpin{0%,100%{transform:rotate(0) scale(1);}50%{transform:rotate(20deg) scale(1.25);}}
  /* Yes/No interactive buttons */
  .yn-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .yn-btn{position:relative;border-radius:18px;padding:26px 18px;border:2.5px solid transparent;background:var(--surface);cursor:pointer;transition:all .25s cubic-bezier(.2,.8,.2,1);overflow:hidden;text-align:center;}
  .yn-btn:hover{transform:translateY(-3px);}
  .yn-btn .yn-icon{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:28px;font-weight:900;transition:all .25s ease;}
  .yn-btn .yn-text{font-weight:900;font-size:22px;letter-spacing:.5px;transition:color .25s ease;}
  .yn-btn .yn-glow{position:absolute;inset:0;border-radius:18px;opacity:0;transition:opacity .3s ease;pointer-events:none;}
  .yn-yes .yn-icon{background:rgba(31,90,78,.12);color:#1f5a4e;}
  .yn-yes:hover{border-color:#1f5a4e;background:rgba(31,90,78,.06);box-shadow:0 12px 28px rgba(31,90,78,.18);}
  .yn-yes:hover .yn-icon{background:#1f5a4e;color:#fff;transform:scale(1.08);}
  .yn-yes:hover .yn-text{color:#1f5a4e;}
  .yn-yes.selected{border-color:#1f5a4e;background:linear-gradient(135deg, rgba(31,90,78,.10), rgba(31,90,78,.04));box-shadow:0 14px 32px rgba(31,90,78,.22);}
  .yn-yes.selected .yn-icon{background:#1f5a4e;color:#fff;transform:scale(1.1);}
  .yn-yes.selected .yn-text{color:#1f5a4e;}
  .yn-yes.selected .yn-glow{opacity:1;background:radial-gradient(circle at 50% 0%, rgba(31,90,78,.18), transparent 60%);}
  .yn-no .yn-icon{background:rgba(184,92,62,.12);color:#b85c3e;}
  .yn-no:hover{border-color:#b85c3e;background:rgba(184,92,62,.06);box-shadow:0 12px 28px rgba(184,92,62,.18);}
  .yn-no:hover .yn-icon{background:#b85c3e;color:#fff;transform:scale(1.08);}
  .yn-no:hover .yn-text{color:#b85c3e;}
  .yn-no.selected{border-color:#b85c3e;background:linear-gradient(135deg, rgba(184,92,62,.10), rgba(184,92,62,.04));box-shadow:0 14px 32px rgba(184,92,62,.22);}
  .yn-no.selected .yn-icon{background:#b85c3e;color:#fff;transform:scale(1.1);}
  .yn-no.selected .yn-text{color:#b85c3e;}
  .yn-no.selected .yn-glow{opacity:1;background:radial-gradient(circle at 50% 0%, rgba(184,92,62,.18), transparent 60%);}
  /* Pie segment hover */
  .pie-wrap svg circle[stroke]:not([stroke^="rgba"]){cursor:pointer;}
  @keyframes piePulse{0%,100%{filter:drop-shadow(0 4px 12px rgba(43,49,60,.08));}50%{filter:drop-shadow(0 4px 18px rgba(43,49,60,.18));}}
  /* Radar vertex halo pulsing */

<script>
(function(){
  var html = document.documentElement;
  var STORAGE_KEY = 'a11y_settings_v1';
  var FS_LEVELS = ['', 'a11y-fs1', 'a11y-fs2', 'a11y-fs3'];
  var state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"fs":0,"highlight":false,"contrast":false,"readable":false,"stop":false}');

  function apply(){
    FS_LEVELS.forEach(function(c){ if(c) html.classList.remove(c); });
    if(state.fs > 0 && FS_LEVELS[state.fs]) html.classList.add(FS_LEVELS[state.fs]);
    html.classList.toggle('a11y-highlight', !!state.highlight);
    html.classList.toggle('a11y-contrast', !!state.contrast);
    html.classList.toggle('a11y-readable', !!state.readable);
    html.classList.toggle('a11y-stop', !!state.stop);
    document.querySelectorAll('.a11y-btn').forEach(function(b){
      var t = b.getAttribute('data-toggle');
      var active = false;
      if(t === 'fs-up' || t === 'fs-down') active = state.fs > 0;
      else active = !!state[t];
      b.classList.toggle('active', active);
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function toggleHandler(t){
    if(t === 'fs-up') state.fs = Math.min(3, state.fs + 1);
    else if(t === 'fs-down') state.fs = Math.max(0, state.fs - 1);
    else state[t] = !state[t];
    apply();
  }

  var btn = document.getElementById('a11yBtn');
  var panel = document.getElementById('a11yPanel');
  var close = document.getElementById('a11yClose');
  var reset = document.getElementById('a11yReset');

  function open(){ panel.style.display = 'block'; btn.setAttribute('aria-expanded','true'); }
  function shut(){ panel.style.display = 'none'; btn.setAttribute('aria-expanded','false'); }

  btn.addEventListener('click', function(){
    if(panel.style.display === 'block') shut(); else open();
  });
  close.addEventListener('click', shut);
  reset.addEventListener('click', function(){
    state = {fs:0, highlight:false, contrast:false, readable:false, stop:false};
    apply();
  });
  document.querySelectorAll('.a11y-btn').forEach(function(b){
    b.addEventListener('click', function(){ toggleHandler(b.getAttribute('data-toggle')); });
  });
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') shut(); });

  // Tuck/untuck the widget to the side
  var wrap = document.getElementById('a11yWrap');
  var tuck = document.getElementById('a11yTuck');
  var TUCK_KEY = 'a11y_tucked_v1';
  function setTucked(t){
    wrap.classList.toggle('tucked', t);
    tuck.textContent = t ? '›' : '‹';
    tuck.setAttribute('aria-label', t ? 'הצגת כפתור הנגישות' : 'הסתרת כפתור הנגישות לצד');
    localStorage.setItem(TUCK_KEY, t ? '1' : '0');
    if(t) shut();
  }
  setTucked(localStorage.getItem(TUCK_KEY) === '1');
  tuck.addEventListener('click', function(e){
    e.stopPropagation();
    setTucked(!wrap.classList.contains('tucked'));
  });

  apply();
})();
</script>

const PILLAR_ICONS = {

};

function PillarRadar({scores,size=280,selected,onSelect}){
  const cx = size/2, cy = size/2, R = (size-70)/2;
  const entries = Object.entries(PILLARS).map(([k,p])=>({k,...p,score:scores[k]||0}));
  const n = entries.length;
  const angles = entries.map((_,i)=> -Math.PI/2 + (i*2*Math.PI/n));
  const points = entries.map((e,i)=>{
    const a = angles[i];
    const v = e.score/100;
    return {
      x: cx + R*v*Math.cos(a),
      y: cy + R*v*Math.sin(a),
      ax: cx + R*Math.cos(a),
      ay: cy + R*Math.sin(a),
      // Per-vertex label distance — sides farther, top/bottom closer; small per-key tweaks
      labelDist: (Math.abs(Math.cos(a)) > 0.7 ? R+52 : R+28) + ({financial:0, mental:8, perceptual:0, personal:4}[e.k] || 0),
      labelX: cx + ((Math.abs(Math.cos(a)) > 0.7 ? R+52 : R+28) + ({financial:0, mental:8, perceptual:0, personal:4}[e.k] || 0))*Math.cos(a),
      labelY: cy + ((Math.abs(Math.cos(a)) > 0.7 ? R+52 : R+28) + ({financial:0, mental:8, perceptual:0, personal:4}[e.k] || 0))*Math.sin(a),
      e
    };
  });
  const ringPolys = [.25,.5,.75,1].map(r => entries.map((_,i)=>{
    const a = angles[i];
    return `${cx+R*r*Math.cos(a)},${cy+R*r*Math.sin(a)}`;
  }).join(' '));
  const fillPoly = points.map(p=>`${p.x},${p.y}`).join(' ');
  const statusColor = (s) => s>=75 ? '#1f5a4e' : s>=50 ? '#a58348' : '#8b5a3e';
  return (
    <svg width={size} height={size} style={{overflow:'visible'}}>
      {ringPolys.map((pts,i)=>(
        <polygon key={i} points={pts} fill="none" stroke="rgba(43,49,60,.08)" strokeWidth="1"/>
      ))}
      {/* Colored spokes — each axis in its pillar color */}
      {points.map((p,i)=>{
        const isSel = selected === p.e.k;
        const isOther = selected && !isSel;
        return (
          <line key={i} x1={cx} y1={cy} x2={p.ax} y2={p.ay}
            stroke={p.e.color}
            strokeWidth={isSel ? 5 : 2}
            strokeLinecap="round"
            opacity={isSel ? 1 : (isOther ? .2 : .55)}
            style={{transition:'all .3s ease', filter: isSel ? `drop-shadow(0 0 6px ${p.e.color}) drop-shadow(0 0 14px ${p.e.color})` : 'none'}}/>
        );
      })}
      <polygon points={fillPoly} fill="rgba(43,49,60,.18)" stroke="#2b313c" strokeWidth="2.5"
        style={{transition:'all .8s cubic-bezier(.2,.8,.2,1)'}}/>
      {/* Vertices with score inside the dot */}
      {points.map((p,i)=>{
        const isSel = selected === p.e.k;
        const isOther = selected && !isSel;
        const r = isSel ? 18 : 15;
        return (
          <g key={i} onClick={()=>onSelect && onSelect(p.e.k)} style={{cursor:onSelect?'pointer':'default'}}>
            {/* Larger transparent click area */}
            <circle cx={p.x} cy={p.y} r="24" fill="transparent"/>
            {/* Soft halo (pulsing when nothing selected) */}
            <circle cx={p.x} cy={p.y} r={r+8} fill={p.e.color}
              className={!selected ? `radar-halo-pulse radar-halo-pulse-${i}` : ''}
              opacity={isSel ? .45 : .18}
              style={{transition:'opacity .3s ease'}}/>
            {/* Main vertex */}
            <circle cx={p.x} cy={p.y} r={r} fill={p.e.color} stroke="#fff" strokeWidth="2.5"
              className={`radar-vertex ${!selected ? `radar-dot-pulse radar-dot-pulse-${i}` : ''}`}
              style={{color:p.e.color, opacity:isOther ? .55 : 1, filter: isSel ? `drop-shadow(0 0 12px ${p.e.color})` : 'drop-shadow(0 2px 6px rgba(43,49,60,.25))', transition:'all .3s ease'}}/>
            {/* Score inside the dot */}
            <text x={p.x} y={p.y} textAnchor="middle" dominantBaseline="central"
              fontSize={isSel ? 12 : 11} fontWeight="900"
              fill="#2b313c"
              style={{pointerEvents:'none', opacity:isOther ? .55 : 1, transition:'all .3s ease'}}>
              {p.e.score}
            </text>
          </g>
        );
      })}
      {/* Pillar name label outside the radar (one line, clean) */}
      {points.map((p,i)=>{
        const isSel = selected === p.e.k;
        const isOther = selected && !isSel;
        const anchor = Math.abs(p.labelX - cx) < 6 ? 'middle' : (p.labelX > cx ? 'start' : 'end');
        return (
          <g key={i} style={{cursor:onSelect?'pointer':'default'}} onClick={()=>onSelect && onSelect(p.e.k)}>
            <text x={p.labelX} y={p.labelY} textAnchor={anchor} dominantBaseline="middle"
              fontSize="13" fontWeight={isSel?900:800} fill="#2b313c"
              style={{opacity:isOther ? .55 : 1, transition:'all .3s ease'}}>
              {PILLAR_ICONS[p.e.k]} {p.e.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function PillarPie({scores,size=240,selected,onSelect}){
  const baseStroke = 36;
  const r = (size - baseStroke - 8) / 2;
  const c = 2 * Math.PI * r;
  const cx = size/2, cy = size/2;
  const entries = Object.entries(PILLARS).map(([k,p])=>({k,label:p.label,color:p.color,value:scores[k]||0}));
  const sum = entries.reduce((a,b)=>a+b.value,0) || 1;
  const gapPx = 3;
  let cumFrac = 0;
  const labels = [];
  const segs = entries.map((e,i)=>{
    const frac = e.value / sum;
    const dash = Math.max(0, c * frac - gapPx);
    const gap = c - dash;
    const offset = -cumFrac * c;
    const midFrac = cumFrac + frac/2;
    const ang = -Math.PI/2 + midFrac * 2 * Math.PI;
    const labelR = r;
    labels.push({
      x: cx + labelR * Math.cos(ang),
      y: cy + labelR * Math.sin(ang),
      value: e.value,
      visible: frac > 0.05,
      key: e.k,
    });
    cumFrac += frac;
    const isSelected = selected === e.k;
    const isOther = selected && !isSelected;
    const stroke = isSelected ? baseStroke + 8 : baseStroke;
    return (
      <circle key={i} cx={cx} cy={cy} r={r} strokeWidth={stroke} fill="none"
        stroke={e.color} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={offset}
        strokeLinecap="butt"
        transform={`rotate(-90 ${cx} ${cy})`}
        onClick={()=>onSelect && onSelect(e.k)}
        style={{transition:'all .35s cubic-bezier(.2,.8,.2,1)',cursor:onSelect?'pointer':'default',opacity:isOther?.45:1,filter:isSelected?`drop-shadow(0 0 8px ${e.color})`:'none'}}/>
    );
  });
  return (
    <svg width={size} height={size} style={{filter:'drop-shadow(0 4px 12px rgba(43,49,60,.08))',transform:'none',overflow:'visible'}}>
      <circle cx={cx} cy={cy} r={r} strokeWidth={baseStroke} fill="none" stroke="rgba(43,49,60,.06)"/>
      {segs}
      <circle cx={cx} cy={cy} r={r - baseStroke/2 - 2} fill="none" stroke="rgba(43,49,60,.04)" strokeWidth="1"/>
      {labels.map((lp,i)=> lp.visible ? (
        <text key={i} x={lp.x} y={lp.y} textAnchor="middle" dominantBaseline="central"
          onClick={()=>onSelect && onSelect(lp.key)}
          style={{fontSize:13,fontWeight:800,fill:'#2b313c',cursor:onSelect?'pointer':'default',paintOrder:'stroke',stroke:'rgba(250,244,228,.9)',strokeWidth:3,strokeLinejoin:'round',opacity:selected && selected!==lp.key ? .45 : 1, transition:'opacity .35s ease'}}>{lp.value}</text>
      ) : null)}
    </svg>
  );
}

                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                  לתאם שיחת אסטרטגיה ←
                </a>
              </div>
            </div>

            {/* YouTube video — featured */}
            <div className="rounded-2xl p-6 md:p-8 mb-6" style={{background:'linear-gradient(135deg, #faf4e4, #f4e8c8)', border:'2px solid rgba(165,131,72,.25)', boxShadow:'0 12px 32px rgba(43,49,60,.08)'}}>
              <div className="flex items-center gap-2 mb-2">
                <span style={{fontSize:18}}>🎥</span>
                <div className="text-xs font-bold" style={{color:'#a58348',letterSpacing:'.5px'}}>מסר אישי מתומר</div>
              </div>
              <h3 className="text-2xl md:text-3xl font-extrabold ink mb-4 leading-tight">מה לעשות עכשיו עם התוצאות שלך</h3>
              {CONFIG.youtubeId ? (
                <>
                  <div style={{position:'relative',paddingBottom:'56.25%',height:0,overflow:'hidden',borderRadius:12}}>
                    <iframe src={`https://www.youtube.com/embed/${CONFIG.youtubeId}?rel=0&modestbranding=1&playsinline=1${CONFIG.youtubeStart?`&start=${CONFIG.youtubeStart}`:''}`}
                      title="Kamir Group" frameBorder="0"
                      style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',border:0}}
                      referrerPolicy="strict-origin-when-cross-origin"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                      allowFullScreen></iframe>
                  </div>
                  <a href={`https://www.youtube.com/watch?v=${CONFIG.youtubeId}${CONFIG.youtubeStart?`&t=${CONFIG.youtubeStart}s`:''}`}
                     target="_blank" rel="noopener"
                     className="block text-center text-xs muted mt-3 hover:text-black underline">
                    לא רואה את הסרטון? פתח ביוטיוב ←
                  </a>
                </>
              ) : (
                <div className="flex flex-col items-center justify-center rounded-xl text-center"
                  style={{aspectRatio:'16/9',background:'rgba(43,49,60,.06)',border:'2px dashed rgba(43,49,60,.15)'}}>
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" style={{color:'var(--muted)',marginBottom:8}}>
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                  </svg>
                  <div className="text-sm muted">כאן יוצב הסרטון – הוסף מזהה ב-<code>CONFIG.youtubeId</code></div>
                </div>
              )}
            </div>

            {/* Journey roadmap */}
            <div className="surface rounded-2xl p-6 mb-6">
              <div className="text-xs muted font-semibold mb-1 text-center">המסע שלך מכאן</div>
              <h3 className="text-xl font-bold ink mb-5 text-center">5 השלבים לנכס הראשון שלך</h3>
              <div className="journey-row flex flex-col md:flex-row flex-wrap gap-2 items-stretch justify-center">
                {[
                  {num:'✓', time:'היום', title:'אבחון אישי', desc:'מיפוי הון עצמי, יעדים וניתוח פערים', state:'done'},
                  {num:'2', time:'אתה כאן', title:'שיחת אסטרטגיה', desc:'תכנון מפת דרכים אישית ובניית תוכנית פעולה', state:'active'},
                  {num:'3', time:'14-30 יום', title:'הקמת תשתית', desc:'פתיחת LLC, חשבון בנק ואיתור אזורי ביקוש', state:''},
                  {num:'4', time:'30-60 יום', title:'איתור וניתוח', desc:'סינון עסקאות וביצוע בדיקות נאותות', state:''},
                  {num:'5', time:'90+ יום', title:'סגירה וניהול', desc:'רכישת הנכס, שיפוץ/השכרה וצ׳ק ראשון', state:''},
                ].map((s,i)=>(
                  <React.Fragment key={i}>
                    {i>0 && <div className="step-arrow hidden md:flex" style={{flex:'0 0 14px'}}>←</div>}
                    <button type="button" onClick={()=>setExpandedStep(expandedStep===i ? null : i)}
                      className={`step-card ${s.state} ${expandedStep===i ? 'expanded' : ''}`}
                      style={{flex:'1 1 160px',minWidth:140,cursor:'pointer'}}>
                      <div className="step-num">{s.num}</div>
                      <div className="step-time">{s.time}</div>
                      <div className={`font-bold ${s.state ? '' : 'ink'}`} style={{fontSize:14}}>{s.title}</div>
                      <div className={`text-xs ${s.state ? '' : 'muted'} mt-1`} style={s.state==='done'?{opacity:.75}:s.state==='active'?{opacity:.8}:{}}>{s.desc}</div>
                    </button>
                  </React.Fragment>
                ))}
              </div>
            </div>

            {/* CTA #2 — qualified WhatsApp intro (full criteria) */}
            <div className="rounded-2xl p-7 md:p-10 mb-6" style={{background:'var(--ink)',color:'#fff'}}>
              <div className="text-center mb-6">
                <div className="text-xs font-bold mb-2" style={{letterSpacing:'.5px',color:'#d9c29a'}}>מוכן לדבר על התוצאות שלך?</div>
                <h3 className="text-2xl md:text-3xl font-extrabold leading-tight">בוא נברר אם זה רלוונטי</h3>
              </div>
              <div className="max-w-lg mx-auto rounded-xl p-5 mb-6" style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(217,194,154,.2)'}}>
                <div className="text-sm font-bold mb-3" style={{color:'#d9c29a'}}>השיחה רלוונטית אם:</div>
                <ul className="space-y-2" style={{listStyle:'none',padding:0}}>
                  <li className="flex items-center gap-3"><span style={{color:'#d9c29a',fontWeight:900,flexShrink:0}}>◆</span><span style={{color:'rgba(255,255,255,.92)',whiteSpace:'nowrap',fontSize:'13px'}}>אתה שוקל ברצינות לרכוש נכס בשנה הקרובה</span></li>
                  <li className="flex items-start gap-3 text-sm"><span style={{color:'#d9c29a',fontWeight:900,flexShrink:0}}>◆</span><span style={{color:'rgba(255,255,255,.92)'}}>יש לך הון של 200K+ ש"ח זמין להשקעה</span></li>
                  <li className="flex items-start gap-3 text-sm"><span style={{color:'#d9c29a',fontWeight:900,flexShrink:0}}>◆</span><span style={{color:'rgba(255,255,255,.92)'}}>אתה יודע להחליט — ומבין שללמוד מניסיון של אחרים שווה זהב</span></li>
                </ul>
              </div>
              <div className="flex flex-col items-center">
                <a href={waLink(lead, tier.label, totalScore)}
                  target="_blank" rel="noopener"
                  className="cta-cream font-extrabold px-8 py-4 rounded-xl flex items-center justify-center gap-2 whitespace-nowrap text-lg">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                  אני עונה על הקריטריונים ←
                </a>
              </div>
            </div>

            {/* Social links */}
            {(CONFIG.youtubeChannel || CONFIG.instagram) && (
              <div className="mt-8 text-center">
                <div className="text-xs muted font-semibold mb-3">מוזמנים להמשיך להתעדכן 👇</div>
                <div className="flex flex-wrap justify-center gap-3">
                  {CONFIG.youtubeChannel && (
                    <a href={CONFIG.youtubeChannel} target="_blank" rel="noopener" className="social-link">
                      <svg width="22" height="22" viewBox="0 0 24 24">
                        <path fill="#FF0000" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/>
                        <path fill="#ffffff" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                      </svg>
                      ערוץ היוטיוב
                    </a>
                  )}
                  {CONFIG.instagram && (
                    <a href={CONFIG.instagram} target="_blank" rel="noopener" className="social-link">
                      <svg width="22" height="22" viewBox="0 0 24 24">
                        <defs>
                          <radialGradient id="igGrad" cx="30%" cy="107%" r="150%">
                            <stop offset="0%" stopColor="#fdf497"/>
                            <stop offset="5%" stopColor="#fdf497"/>
                            <stop offset="45%" stopColor="#fd5949"/>
                            <stop offset="60%" stopColor="#d6249f"/>
                            <stop offset="90%" stopColor="#285AEB"/>
                          </radialGradient>
                        </defs>
                        <rect x="2" y="2" width="20" height="20" rx="5.5" ry="5.5" fill="url(#igGrad)"/>
                        <circle cx="12" cy="12" r="4" fill="none" stroke="#ffffff" strokeWidth="1.8"/>
                        <circle cx="17.6" cy="6.4" r="1.1" fill="#ffffff"/>
                      </svg>
                      אינסטגרם
                    </a>
                  )}
                </div>
              </div>
            )}

            <div className="mt-8 p-4 rounded-xl text-xs leading-relaxed" style={{background:'rgba(43,49,60,.05)',color:'var(--muted)',border:'1px solid rgba(43,49,60,.10)'}}>
              <strong style={{color:'var(--ink-2)'}}>הבהרה:</strong> השאלון והתוצאות הם מידע כללי ושיווקי בלבד, ואינם מהווים ייעוץ השקעות, ייעוץ מיסוי או ייעוץ משפטי אישי. כל החלטת השקעה צריכה להתבסס על ייעוץ פרטני מאיש מקצוע מורשה. <button onClick={()=>setLegalModal('privacy')} className="underline" style={{color:'var(--ink-2)',background:'none',border:'none',cursor:'pointer',padding:0,fontWeight:700}}>קרא עוד במדיניות הפרטיות</button>.
            </div>
            <button onClick={()=>{setScreen('landing');setIdx(0);setAnswers({});setBonus(null);setSent(false);}}
              className="mt-6 muted hover:text-black text-sm">← התחל שאלון מחדש</button>
            <p className="mt-4 text-xs muted text-center">
              <button onClick={()=>setLegalModal('privacy')} className="underline" style={{color:'var(--ink-2)',background:'none',border:'none',cursor:'pointer',padding:0,fontWeight:600}}>מדיניות פרטיות</button>
              {' · '}
              <button onClick={()=>setLegalModal('access')} className="underline" style={{color:'var(--ink-2)',background:'none',border:'none',cursor:'pointer',padding:0,fontWeight:600}}>הצהרת נגישות</button>
            </p>
          </div>
        </div>
        <LegalModal/>
      </div>
    );
  }

  /* ---------- QUIZ ---------- */
  const q = QUESTIONS[idx];
  const p = PILLARS[q.pillar];
  const selected = answers[idx];

  const minutesLeft = Math.max(1, Math.ceil((total - idx) * 16 / 60));
  const progressRatio = (idx+1) / total;
  const eased = Math.pow(progressRatio, 2.2);
  const progressColor = `hsl(${Math.round(32 + (155 - 32) * eased)}, ${Math.round(55 - 15*eased)}%, ${Math.round(48 - 8*eased)}%)`;

  return (
    <div className="min-h-screen flex flex-col">
      <Celebration/>
      <header className="p-5 md:p-8"><Logo/></header>
      <div className="flex-1 flex items-center justify-center p-6">
        <div className="max-w-2xl w-full">
          <div className="flex items-center justify-between mb-3 text-sm">
            <span className="muted text-xs">כ-{minutesLeft} דק׳ נותרו</span>
            <span className="font-extrabold text-base" style={{color:progressColor,transition:'color .5s ease'}}>{idx+1}/{total}</span>
          </div>
          <div className="progress-bar mb-8"><div style={{width:`${((idx)/total)*100}%`,background:progressColor,transition:'width .5s ease,background .5s ease'}}></div></div>

          <div key={idx} className="fade-in">
            <div className="q-badge" style={{background:`${p.color}30`,border:`1px solid ${p.color}66`}}>
              <div className="q-badge-icon" style={{background:p.color}}>{PILLAR_ICONS[q.pillar]}</div>
              <div>
                <div className="font-bold ink text-sm leading-tight">{p.label}</div>
                <div className="text-xs muted leading-tight">{p.sub}</div>
              </div>
            </div>
            {q.titleHtml
              ? <h2 className="font-bold mb-6 leading-snug ink" style={{fontSize:'clamp(1.45rem, 5.2vw, 1.875rem)'}} dangerouslySetInnerHTML={{__html:q.titleHtml}}/>
              : <h2 className="font-bold mb-6 leading-snug ink" style={{fontSize:'clamp(1.45rem, 5.2vw, 1.875rem)'}}>{q.title}</h2>}
            {q.type === 'yesno' ? (
              <div className="yn-row">
                {q.options.map((o,i)=>{
                  const isYes = o.text === 'כן';
                  return (
                    <button key={i} onClick={()=>pick(i)}
                      className={`yn-btn ${isYes?'yn-yes':'yn-no'} ${selected===i?'selected':''}`}>
                      <span className="yn-glow"></span>
                      <div className="yn-icon">{isYes ? '✓' : '✕'}</div>
                      <div className="yn-text">{o.text}</div>
                    </button>
                  );
                })}
              </div>
            ) : q.type === 'scale' ? (
              <div className="scale-wrap">
                <div className="scale-row">
                  {q.options.map((o,i)=>{
                    const ratio = i / (q.options.length - 1);
                    const hue = 150 - ratio * 140;
                    const bg = selected===i ? `hsl(${hue},55%,45%)` : `hsl(${hue},55%,88%)`;
                    const fg = selected===i ? '#fff' : 'var(--ink)';
                    return (
                      <button key={i} onClick={()=>pick(i)}
                        className={`scale-btn ${selected===i?'selected':''}`}
                        style={{background:bg,color:fg}}>{o.text}</button>
                    );
                  })}
                </div>
                <div className="scale-anchor-row">
                  <span className="scale-anchor">{q.scaleLow}</span>
                  <span className="scale-anchor filler" style={{flex:8}}></span>
                  <span className="scale-anchor">{q.scaleHigh}</span>
                </div>
                {selected != null && (
                  <div className="scale-feedback">
                    {selected <= 2 ? '✓ אתה יציב מול דעות חיצוניות' :
                     selected <= 5 ? 'דעות חיצוניות משפיעות עליך במידה מסוימת' :
                     selected <= 7 ? 'דעות חיצוניות יכולות לערער החלטה' :
                     'דעות חיצוניות משפיעות עליך חזק'}
                  </div>
                )}
              </div>
            ) : (
              <div className="space-y-3">
                {q.options.map((o,i)=>(
                  <button key={i} onClick={()=>pick(i)}
                    className={`option-card w-full text-right rounded-xl p-4 ${selected===i?'selected':''}`}
                    style={selected===i?{borderColor:p.color,boxShadow:`0 0 0 2px ${p.color}55`}:{}}>
                    {o.html
                      ? <div className="font-semibold ink" dangerouslySetInnerHTML={{__html:o.html}}/>
                      : <div className="font-semibold ink">{o.text}</div>}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="flex justify-start mt-8 text-sm">
            <button disabled={idx===0} onClick={()=>setIdx(idx-1)}
              className="muted hover:text-black disabled:opacity-30">← שאלה קודמת</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
